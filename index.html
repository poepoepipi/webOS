<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal</title>

    <style>
        body {
            margin: 0;
            background: black;
            color: #00ff00;
            font-family: "Courier New", monospace;
            font-size: 18px;
            padding: 20px;
        }

        #terminal {
            white-space: pre-wrap;
        }

        .prompt {
            display: flex;
        }

        .prompt::before {
            content: "user@website:~$ ";
        }

        input {
            background: transparent;
            border: none;
            outline: none;
            color: #00ff00;
            font-family: inherit;
            font-size: inherit;
            flex: 1;
        }
    </style>
</head>
<body>

<div id="terminal">
    <div>Welcome to SOEP OS!</div>
    <div>Type "help" for a list of commands.</div>
    <br>
</div>

<script>
const terminal = document.getElementById("terminal");

function createPrompt() {
    const prompt = document.createElement("div");
    prompt.className = "prompt";

    const input = document.createElement("input");
    input.type = "text";
    input.autofocus = true;

    prompt.appendChild(input);
    terminal.appendChild(prompt);

    input.focus();

    input.addEventListener("keydown", function (event) {
        if (event.key !== "Enter") return;

        const command = input.value.trim().toLowerCase();

        // Lock the input
        input.disabled = true;

        if (command === "help") {
            const output = document.createElement("div");
            output.innerHTML =
`Available commands:
help   - Show this menu
start  - Open the GUI
clear  - Clear the terminal
neofetch - does the cool thingy
about - info about me`;
            terminal.appendChild(output);
        }

        else if (command === "start") {
            const output = document.createElement("div");
            output.textContent = "Loading...";
            terminal.appendChild(output);

            setTimeout(() => {
                window.location.href = "home.html";
            }, 500);

            return;
        }

        else if (command === "clear") {
            terminal.innerHTML = "";
            createPrompt();
            return;
        }

        else if (command === "about") {
            const output = document.createElement("div");
            output.innerHTML = `
        About Me

        Hi! I'm SOEP/poepoepipi.
        I'm a developer who enjoys building websites,
        electronics projects, servers, and other fun things.

        Type <b>start</b> to enter the graphical version of the website.
        `;
            terminal.appendChild(output);
        }

        else if (command === "neofetch") {
            const output = document.createElement("div");
            output.innerHTML = `
        <pre>
              ███████╗ ██████╗ ███████╗██████╗       SOEP@website
              ██╔════╝██╔═══██╗██╔════╝██╔══██╗      -------------
              ███████╗██║   ██║█████╗  ██████╔╝      OS: SOEPOS 
              ╚════██║██║   ██║██╔══╝  ██╔═══╝       Host: Personal Website
              ███████║╚██████╔╝███████╗██║           Shell: website-terminal 
              ╚══════╝ ╚═════╝ ╚══════╝╚═╝           Uptime: Since you opened this page
                                                     Language: HTML / CSS / JavaScript
                                                     Status: Building cool stuff
        </pre>
        `;
            terminal.appendChild(output);
        }

        else if (command !== "") {
            const output = document.createElement("div");
            output.textContent = `Unknown command: ${command}`;
            terminal.appendChild(output);
        }

        createPrompt();
    });
}

createPrompt();
</script>

</body>
</html>
